<h1>Nova Conta</h1>

<form id="formConta">
    <input type="text" placeholder="Descrição" id="descricao"><br><br>

    <select id="tipo">
        <option value="PAGAR">Pagar</option>
        <option value="RECEBER">Receber</option>
    </select><br><br>

    <input type="number" placeholder="Valor" id="valor"><br><br>

    <input type="date" id="vencimento"><br><br>

    <input type="number" placeholder="Categoria ID" id="categoria"><br><br>

    <button type="submit">Salvar</button>
</form>

<script src="../js/cadastro-conta.js"></script>
